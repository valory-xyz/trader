; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, check-abciapp-specs, check-abci-docstrings, check-handlers, py{3.10,3.11,3.12,3.13,3.14}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True
uv_seed = true

[deps-tests]
deps =
    pip
    tomte[tests]==0.6.5

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy[all]==0.21.19
    open-aea-ledger-ethereum==2.2.1
    open-aea-ledger-cosmos==2.2.1
    open-aea-test-autonomy==0.21.19
    open-aea-helpers==0.21.19
    open-aea-cli-ipfs==2.2.1
    requests<2.33.0,>=2.28.1
    py-eth-sig-utils
    grpcio==1.78.0
    asn1crypto<1.5.0,>=1.4.0
    protobuf<6,>=5
    hypothesis==6.21.6
    web3<8,>=7.0.0
    aiohttp<4.0.0,>=3.8.5
    certifi
    multidict
    ecdsa>=0.15
    eth_typing
    hexbytes==1.3.0
    packaging
    py-ecc==8.0.0
    typing_extensions<=4.15.0,>=3.10.0.2
    pytest-asyncio==1.3.0
    eth-utils==5.3.0
    eth-abi==5.2.0
    pytest==8.4.2
    jsonschema<5.0.0,>=4.23.0
    openapi-core==0.22.0
    openapi-spec-validator<0.8.0,>=0.7.0
    pydantic<3,>=2.11.9
    w3multicall>=0.3.1
    click>=8.1.0,<9
    multiaddr==0.0.9
    setuptools<=81.0.0

[deps-base]
deps ={[deps-packages]deps}

[testenv-multi-ubuntu]
deps = {[deps-base]deps}

[testenv-multi-win]
deps =
    {[deps-base]deps}
    pywin32==311
    websocket-client==0.59.0
    idna==3.3

[testenv-multi-darwin]
deps = {[deps-base]deps}

[extra-deps]
deps =
    attrs
    dateutil<4,>=2
    eth-account<0.14.0,>=0.13.0
    google-generativeai==0.8.2
    httpx<1,>=0.23.0
    open-aea-test-autonomy==0.21.19
    py-builder-relayer-client==0.0.1
    py-clob-client==0.34.5
    py-order-utils==0.3.2
    py_builder_signing_sdk<1,>=0.0.1
    pyinstaller==6.19.0
    python-dateutil<4,>=2
    pyyaml<7.0.0,>=6.0.0
    typing-extensions>=4.13.2
    urllib3<3,>=1.21.1
    werkzeug
; end-extra

[testenv]
basepython = python3
allowlist_externals = /bin/sh
deps = {[deps-base]deps}
passenv = *
setenv =
    UV_PRERELEASE=allow
    PYTHONHASHSEED=0
    PYTHONPATH={env:PWD:%CD%}
    PACKAGES_PATHS = packages/valory
    SKILLS_PATHS = {env:PACKAGES_PATHS}/skills
    CONNECTION_PATHS = {env:PACKAGES_PATHS}/connections
    SERVICE_SPECIFIC_PACKAGES = {env:SKILLS_PATHS}/staking_abci {env:SKILLS_PATHS}/market_manager_abci {env:SKILLS_PATHS}/decision_maker_abci {env:SKILLS_PATHS}/trader_abci {env:SKILLS_PATHS}/tx_settlement_multiplexer_abci {env:SKILLS_PATHS}/chatui_abci {env:SKILLS_PATHS}/check_stop_trading_abci {env:SKILLS_PATHS}/agent_performance_summary_abci {env:CONNECTION_PATHS}/polymarket_client
    CONTRACTS_PATHS = {env:PACKAGES_PATHS}/contracts
