; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Lint-time-only extras NOT in [project].dependencies. Anything that ships
; at runtime is auto-derived by `tomte tox` from pyproject — do not duplicate.
extra_deps =
    py-eth-sig-utils
    eth_typing
    packaging

extra_pylint_disables = C0103,R0801,R0912,C0301,C0201,C0204,C0209,W1203,C0302,R1735,R1729,W0511

[pytest]
; Opt in to tomte's canonical pytest defaults (integration/e2e markers,
; aea.* DeprecationWarning filter). Plugin is silent without this flag so
; non-fleet `tomte[black]` consumers don't get unexpected config injection.
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.20) ships a pytest plugin with a broken import that
; crashes pytest collection. Disable its pytest11 entry point.
addopts = -p no:pytest_anchorpy

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not lint-clean).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_round_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.registration_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.mech_interact_abci.*]
ignore_missing_imports = True

; Repo-specific libraries without type stubs (those used universally across
; the agent fleet are in tomte's canonical mypy.ini).
[mypy-toml.*]
ignore_missing_imports = True

[mypy-eth_abi.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-ipfshttpclient.*]
ignore_missing_imports = True

[mypy-mech_client.*]
ignore_missing_imports = True

[mypy-py_eth_sig_utils.*]
ignore_missing_imports = True

[mypy-open-aea-web3.*]
ignore_missing_imports = True

[mypy-hexbytes.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-eth_account.*]
ignore_missing_imports = True

[mypy-dateutil.*]
ignore_missing_imports = True


[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.20
; anchorpy / based58 / jsonalias: transitive deps via open-aea-ledger-solana
; (added by open-autonomy 0.21.20). All three ship under MIT per their
; GitHub repos but expose no PyPI License field, so PARANOID liccheck
; reports them UNKNOWN.
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1
; httpx: pulled in via solana << anchorpy. uv resolves a 1.0.dev* build
; under prerelease = "allow"; that build's metadata ships no License field.
; httpx is BSD-3-Clause upstream. liccheck parses this block with
; `semantic_version` (SemVer), not PEP 440 — the pre-release suffix here
; is `-dev` (SemVer), not `.dev0` (PEP 440); the canonical PEP 440 form
; is rejected with `ValueError: Invalid simple block`.
httpx: >=1.0.0-dev,<2
; build tools, not distributed with the software
pyinstaller:6.19.0
pyinstaller-hooks-contrib:<2027
