; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
extra_deps =
    requests<2.33.0,>=2.28.1
    py-eth-sig-utils
    grpcio==1.78.0
    asn1crypto<1.5.0,>=1.4.0
    protobuf<6,>=5
    hypothesis==6.21.6
    web3<8,>=7.0.0
    aiohttp<4.0.0,>=3.8.5
    certifi
    multidict
    ecdsa>=0.15
    eth_typing
    hexbytes==1.3.0
    packaging
    py-ecc==8.0.0
    typing_extensions<=4.15.0,>=3.10.0.2
    pytest-asyncio==1.3.0
    eth-utils==5.3.0
    eth-abi==5.2.0
    pytest==8.4.2
    jsonschema<5.0.0,>=4.23.0
    openapi-core==0.22.0
    openapi-spec-validator<0.8.0,>=0.7.0
    pydantic<3,>=2.11.9
    w3multicall>=0.3.1
    click>=8.1.0,<9
    multiaddr==0.0.9
    setuptools<=81.0.0
    types-python-dateutil==2.9.0.20251115
    google-generativeai==0.8.2
    httpx<1,>=0.23.0
    py-builder-relayer-client==0.0.1
    py_clob_client_v2==1.0.0
    poly_eip712_structs<0.1,>=0.0.1
    pyinstaller==6.19.0

extra_pylint_disables = C0103,R0801,R0912,C0301,C0201,C0204,C0209,W1203,C0302,R1735,R1729,W0511

[testenv:coverage]
basepython = python3.14
platform = ^linux$
skipsdist = True
usedevelop = True
deps = {[deps-packages]deps}
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all
    pytest -rfE \
        packages/valory/skills/decision_maker_abci/tests \
        packages/valory/skills/check_stop_trading_abci/tests \
        packages/valory/skills/market_manager_abci/tests \
        packages/valory/skills/staking_abci/tests \
        packages/valory/skills/trader_abci/tests \
        packages/valory/skills/tx_settlement_multiplexer_abci/tests \
        packages/valory/skills/agent_performance_summary_abci/tests \
        packages/valory/skills/chatui_abci/tests \
        packages/valory/connections/polymarket_client/tests \
        packages/valory/customs/kelly_criterion/test_kelly_criterion.py \
        packages/valory/customs/fixed_bet/test_fixed_bet.py \
        packages/valory/contracts/mech_activity/tests \
        packages/valory/contracts/relayer/tests \
        packages/valory/contracts/realitio_proxy/tests \
        packages/valory/contracts/realitio/tests \
        packages/valory/contracts/conditional_tokens/tests \
        packages/valory/contracts/market_maker/tests \
        packages/valory/contracts/service_staking_token/tests \
        --cov=packages.valory.skills.decision_maker_abci \
        --cov=packages.valory.skills.check_stop_trading_abci \
        --cov=packages.valory.skills.market_manager_abci \
        --cov=packages.valory.skills.staking_abci \
        --cov=packages.valory.skills.trader_abci \
        --cov=packages.valory.skills.tx_settlement_multiplexer_abci \
        --cov=packages.valory.skills.agent_performance_summary_abci \
        --cov=packages.valory.skills.chatui_abci \
        --cov=packages.valory.connections.polymarket_client \
        --cov=packages.valory.customs.kelly_criterion \
        --cov=packages.valory.customs.fixed_bet \
        --cov=packages.valory.contracts.mech_activity \
        --cov=packages.valory.contracts.relayer \
        --cov=packages.valory.contracts.realitio_proxy \
        --cov=packages.valory.contracts.realitio \
        --cov=packages.valory.contracts.conditional_tokens \
        --cov=packages.valory.contracts.market_maker \
        --cov=packages.valory.contracts.service_staking_token \
        --cov-branch \
        --cov-report=xml \
        --cov-report=term \
        --cov-report=term-missing \
        --cov-config=.coveragerc \
        {posargs}

[darglint]
docstring_style = sphinx
strictness = short
ignore_regex = async_act|.*_pb2\.py
ignore = DAR401

[mypy]
python_version = 3.10
strict_optional = True
namespace_packages = True
explicit_package_bases = True
exclude=(.*_pb2|.*custom_types)
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

[mypy-aea.*]
ignore_missing_imports = True

[mypy-packages.open_aea.*]
ignore_errors=True

[mypy-toml.*]
ignore_missing_imports = True

