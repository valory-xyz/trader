[commands-base]
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all

[commands-packages]
commands =
    {[commands-base]commands}
    pytest -rfE {env:SKILLS_PATHS}/decision_maker_abci/tests {posargs}
    pytest -rfE {env:SKILLS_PATHS}/check_stop_trading_abci/tests {posargs}
    pytest -rfE {env:SKILLS_PATHS}/market_manager_abci/tests {posargs}
    pytest -rfE {env:SKILLS_PATHS}/staking_abci/tests {posargs}
    pytest -rfE {env:SKILLS_PATHS}/trader_abci/tests {posargs}
