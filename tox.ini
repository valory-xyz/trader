; NOTE: funds-manager upstream pin is temporarily dropped. The OA 0.21.19 /
; mech-interact 0.28.0 bump cascades a new abstract_round_abci hash into
; funds_manager/skill.yaml, which makes funds-manager v2.2.0's published hash
; un-reachable. The funds-manager repo's main branch already has the cleanup
; commit applied — this pin should be restored as `--upstream
; valory-xyz/funds-manager@<next-tag>` once a new release is cut at that HEAD.
commands =
    aea-ci check-third-party-hashes \
        --upstream valory-xyz/open-autonomy@0.21.19 \
        --upstream valory-xyz/open-aea@2.2.1 \
        --upstream valory-xyz/mech-interact@0.28.0 \
